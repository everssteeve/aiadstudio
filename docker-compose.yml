services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: aiad_studio
      POSTGRES_USER: aiad
      POSTGRES_PASSWORD: aiad_dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aiad -d aiad_studio"]
      interval: 5s
      timeout: 5s
      retries: 5

  server:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgres://aiad:aiad_dev@db:5432/aiad_studio
      PORT: 3000
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
